<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="./css/main.css" />
		<link rel="stylesheet" href="./css/style.css" />
		<title>typing-speed-game</title>
	</head>
	<body>
		<header>
			<nav>
				<div>
					<img src="./assets/Logo  - Mark.svg" alt="logo" />
					<img src="./assets/Title Container.svg" alt="title" />
				</div>
				<div>
					<img src="./assets/Trophy Icon.svg" alt="" />
					<p><span>Best:</span> 0 WPM</p>
				</div>
			</nav>
		</header>
		<main>
			<section>
				<div>
					<div>
						<h2>WPM:</h2>
						<p>0</p>
					</div>
					<hr />
					<div>
						<h2>Accuracy:</h2>
						<p>100%</p>
					</div>
					<hr />
					<div>
						<h2>Time:</h2>
						<p>0:60</p>
					</div>
				</div>
				<div>
					<h3>Difficulty:</h3>
					<p>Easy</p>
					<p>Medium</p>
					<p>Hard</p>
				</div>
			</section>
			<hr />
			<section></section>
			<hr />
			<section>
				<button>
					Restart Test
					<img src="./assets/Undo Icon.svg" alt="restart" />
				</button>
			</section>
		</main>
	</body>
</html>
