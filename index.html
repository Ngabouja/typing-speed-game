<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="./css/main.css" />
		<link rel="stylesheet" href="./css/style.css" />
		<title>typing-speed-game</title>
	</head>
	<body>
		<dialog id="dialog" open>
			<article id="article">
				<button id="btnarticle" class="text-preset3-semibold start">
					Start Typing Test
				</button>
				<p class="text-preset3-semibold start-p">
					Or click the text and start typing
				</p>
			</article>
		</dialog>
		<header>
			<nav>
				<div class="nav-1">
					<img src="./assets/Logo  - Mark.svg" alt="logo" />
					<img
						class="img-none"
						src="./assets/Title Container.svg"
						alt="title"
					/>
				</div>
				<div class="best-wmp">
					<img src="./assets/Trophy Icon.svg" alt="" />
					<p class="text-preset3-mobile text4 col">
						<span><span class="none">Personal</span> Best : </span>
						<span id="best-wpm">0</span> WPM
					</p>
				</div>
			</nav>
		</header>
		<main>
			<section class="main1">
				<div class="typingstats">
					<div class="stats">
						<h2 class="text-preset3-mobile text">WPM:</h2>
						<p class="text-preset4 w"><span id="wpm">0</span></p>
					</div>
					<hr class="hr1" />
					<div class="stats">
						<h2 class="text-preset3-mobile text">Accuracy:</h2>
						<p class="text-preset4 w" id="accuracy">100%</p>
					</div>
					<hr class="hr1" />
					<div class="stats">
						<h2 class="text-preset3-mobile text">Time:</h2>
						<p class="text-preset4 w" id="time">0:60</p>
					</div>
				</div>
				<div class="sctdifficulty">
					<h3 class="text-preset5">Difficulty:</h3>
					<form class="lv-difficulty">
						<input type="radio" id="easy" name="difficulty" />
						<label id="btn-easy" class="text-preset5" for="easy">Easy</label>

						<input type="radio" id="medium" name="difficulty" />
						<label id="btn-medium" class="text-preset5" for="medium"
							>Medium</label
						>

						<input type="radio" id="hard" name="difficulty" />
						<label id="btn-hard" class="text-preset5" for="hard">Hard</label>
					</form>
				</div>
			</section>
			<hr class="hr2" />
			<section class="words">
				<div class="absolute text-preset1-regular-mobile tablette"></div>
				<div
					id="relativetext"
					class="relative hidden text-preset1-regular-mobile tablette"
				></div>
				<div class="restart-container">
					<hr class="hr2" />
					<div class="sct-btn-restart">
						<button id="restart" class="text-preset3-semibold restart">
							Restart Test
							<img src="./assets/Undo Icon.svg" alt="restart" />
						</button>
					</div>
				</div>
			</section>
		</main>
		<script src="main.js"></script>
	</body>
</html>
