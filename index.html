<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="./css/main.css" />
		<link rel="stylesheet" href="./css/style.css" />
		<title>typing-speed-game</title>
	</head>
	<body>
		<header>
			<nav>
				<div class="nav-1">
					<img src="./assets/Logo  - Mark.svg" alt="logo" />
					<img
						class="img-none"
						src="./assets/Title Container.svg"
						alt="title"
					/>
				</div>
				<div class="best-wmp">
					<img src="./assets/Trophy Icon.svg" alt="" />
					<p class="text-preset3-mobile text4 col">
						<span><span class="none">Personal</span> Best : </span> 0 WPM
					</p>
				</div>
			</nav>
		</header>
		<main>
			<section>
				<div class="typingstats">
					<div class="stats">
						<h2 class="text-preset3-mobile">WPM:</h2>
						<p class="text-preset4 w">0</p>
					</div>
					<hr class="hr1" />
					<div class="stats">
						<h2 class="text-preset3-mobile">Accuracy:</h2>
						<p class="text-preset4 w">100%</p>
					</div>
					<hr class="hr1" />
					<div class="stats">
						<h2 class="text-preset3-mobile">Time:</h2>
						<p class="text-preset4 w">0:60</p>
					</div>
				</div>
				<div class="sctdifficulty">
					<h3 class="text-preset5">Difficulty:</h3>
					<form class="lv-difficulty">
						<input type="radio" id="easy" name="difficulty" />
						<label class="text-preset5" for="easy">Easy</label>

						<input type="radio" id="medium" name="difficulty" />
						<label class="text-preset5" for="medium">Medium</label>

						<input type="radio" id="hard" name="difficulty" />
						<label class="text-preset5" for="hard">Hard</label>
					</form>
				</div>
			</section>
			<hr />
			<section></section>
			<hr />
			<section>
				<button>
					Restart Test
					<img src="./assets/Undo Icon.svg" alt="restart" />
				</button>
			</section>
		</main>
	</body>
</html>
